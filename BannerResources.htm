      function downloadFile(filename, base64Data) {
        var base64Clean = base64Data.includes(",")
          ? base64Data.split(",")[1]
          : base64Data
        var byteCharacters = atob(base64Clean)
        var byteNumbers = new Array(byteCharacters.length)
        for (var i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i)
        }
        var byteArray = new Uint8Array(byteNumbers)
        var blob = new Blob([byteArray], { type: "application/octet-stream" })
        var url = URL.createObjectURL(blob)

        var a = document.createElement("a")
        a.href = url
        a.download = filename
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      }

      function getFileIcon(ext) {
        if (ext === "pdf") {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><text x="12" y="17" font-size="6" fill="#e53935" stroke="none" text-anchor="middle" font-weight="bold">PDF</text></svg>'
        }
        return '<svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
      }

      function renderFileList() {
        var fileList = document.getElementById("fileList")
        fileList.innerHTML = ""

        var sortedFiles = myFiles.slice().sort(function (a, b) {
          var nameA = Object.keys(a)[0].toLowerCase()
          var nameB = Object.keys(b)[0].toLowerCase()
          return nameA.localeCompare(nameB, undefined, { numeric: true })
        })

        sortedFiles.forEach(function (fileObj) {
          var filename = Object.keys(fileObj)[0]
          var base64Data = fileObj[filename]
          var ext = filename.split(".").pop().toLowerCase()

          var item = document.createElement("div")
          item.className = "file-item"

          var iconDiv = document.createElement("div")
          iconDiv.className = "file-icon"

          if (
            ext === "png" ||
            ext === "jpg" ||
            ext === "jpeg" ||
            ext === "gif" ||
            ext === "svg"
          ) {
            var img = document.createElement("img")
            img.src = base64Data
            iconDiv.appendChild(img)
            if (ext === "png" || ext === "svg") {
              iconDiv.classList.add("transparent")
            }
          } else {
            iconDiv.innerHTML = getFileIcon(ext)
          }

          var nameDiv = document.createElement("div")
          nameDiv.className = "file-name"
          nameDiv.textContent = filename

          item.appendChild(iconDiv)
          item.appendChild(nameDiv)
          item.addEventListener("click", function () {
            downloadFile(filename, base64Data)
          })
          fileList.appendChild(item)
        })
      }

      window.addEventListener("load", function () {
        // checking if the app is loaded properly
        var secSameDomain = false
        var secNotIframe = window.top === window.self
        var secLocalFile = window.self.location.protocol === "file:"
        try {
          secSameDomain =
            window.top !== window.self &&
            window.top.location.hostname === window.self.location.hostname
        } catch (err) {
          //
        }
        if (secNotIframe || secSameDomain || secLocalFile) {
          document.getElementsByTagName("body")[0].style.backgroundColor = "#eee"
          document.querySelector(".pleasewait").style.display = "none"
          document.getElementById("container").style.display = "block"
          renderFileList()
        }
      })
    </script>
