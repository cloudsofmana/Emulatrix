              tBuffer[tIndex] = tBuffer[tIndex] + sR * sqScale
              tBuffer[tIndex + 1] = tBuffer[tIndex + 1] + sG * sqScale
              tBuffer[tIndex + 2] = tBuffer[tIndex + 2] + sB * sqScale
              tBuffer[tIndex + 3] = tBuffer[tIndex + 3] + sA * sqScale
            } else if (crossX && !crossY) {
              w = wx * scale
              tBuffer[tIndex] = tBuffer[tIndex] + sR * w
              tBuffer[tIndex + 1] = tBuffer[tIndex + 1] + sG * w
              tBuffer[tIndex + 2] = tBuffer[tIndex + 2] + sB * w
              tBuffer[tIndex + 3] = tBuffer[tIndex + 3] + sA * w
              nw = nwx * scale
              tBuffer[tIndex + 4] = tBuffer[tIndex + 4] + sR * nw
              tBuffer[tIndex + 5] = tBuffer[tIndex + 5] + sG * nw
              tBuffer[tIndex + 6] = tBuffer[tIndex + 6] + sB * nw
              tBuffer[tIndex + 7] = tBuffer[tIndex + 7] + sA * nw
            } else if (crossY && !crossX) {
              w = wy * scale
              tBuffer[tIndex] = tBuffer[tIndex] + sR * w
              tBuffer[tIndex + 1] = tBuffer[tIndex + 1] + sG * w
              tBuffer[tIndex + 2] = tBuffer[tIndex + 2] + sB * w
              tBuffer[tIndex + 3] = tBuffer[tIndex + 3] + sA * w
              nw = nwy * scale
              tBuffer[tIndex + 4 * tw] = tBuffer[tIndex + 4 * tw] + sR * nw
              tBuffer[tIndex + 4 * tw + 1] = tBuffer[tIndex + 4 * tw + 1] + sG * nw
              tBuffer[tIndex + 4 * tw + 2] = tBuffer[tIndex + 4 * tw + 2] + sB * nw
              tBuffer[tIndex + 4 * tw + 3] = tBuffer[tIndex + 4 * tw + 3] + sA * nw
            } else {
              w = wx * wy
              tBuffer[tIndex] = tBuffer[tIndex] + sR * w
              tBuffer[tIndex + 1] = tBuffer[tIndex + 1] + sG * w
              tBuffer[tIndex + 2] = tBuffer[tIndex + 2] + sB * w
              tBuffer[tIndex + 3] = tBuffer[tIndex + 3] + sA * w
              nw = nwx * wy
              tBuffer[tIndex + 4] = tBuffer[tIndex + 4] + sR * nw
              tBuffer[tIndex + 5] = tBuffer[tIndex + 5] + sG * nw
              tBuffer[tIndex + 6] = tBuffer[tIndex + 6] + sB * nw
              tBuffer[tIndex + 7] = tBuffer[tIndex + 7] + sA * nw
              nw = wx * nwy
              tBuffer[tIndex + 4 * tw] = tBuffer[tIndex + 4 * tw] + sR * nw
              tBuffer[tIndex + 4 * tw + 1] = tBuffer[tIndex + 4 * tw + 1] + sG * nw
              tBuffer[tIndex + 4 * tw + 2] = tBuffer[tIndex + 4 * tw + 2] + sB * nw
              tBuffer[tIndex + 4 * tw + 3] = tBuffer[tIndex + 4 * tw + 3] + sA * nw
              nw = nwx * nwy
              tBuffer[tIndex + 4 * tw + 4] = tBuffer[tIndex + 4 * tw + 4] + sR * nw
              tBuffer[tIndex + 4 * tw + 5] = tBuffer[tIndex + 4 * tw + 5] + sG * nw
              tBuffer[tIndex + 4 * tw + 6] = tBuffer[tIndex + 4 * tw + 6] + sB * nw
              tBuffer[tIndex + 4 * tw + 7] = tBuffer[tIndex + 4 * tw + 7] + sA * nw
            }
          }
        }

        var resCV = document.createElement("canvas")
        resCV.width = tw
        resCV.height = th
        var resCtx = resCV.getContext("2d")
        var imgRes = resCtx.getImageData(0, 0, tw, th)
        var tByteBuffer = imgRes.data

        var pxIndex = 0
        for (
          sIndex = 0, tIndex = 0;
          pxIndex < tw * th;
          sIndex = sIndex + 4, tIndex = tIndex + 4, pxIndex = pxIndex + 1
        ) {
          tByteBuffer[tIndex] = Math.ceil(tBuffer[sIndex])
          tByteBuffer[tIndex + 1] = Math.ceil(tBuffer[sIndex + 1])
          tByteBuffer[tIndex + 2] = Math.ceil(tBuffer[sIndex + 2])
          tByteBuffer[tIndex + 3] = Math.ceil(tBuffer[sIndex + 3])
        }

        resCtx.putImageData(imgRes, 0, 0)
        return resCV
      }

      function resizeImageToFit(img, width, height) {
        // CREATE AN OFF-SCREEN CANVAS
        var offScreenCanvas = document.createElement("canvas")
        var ctx = offScreenCanvas.getContext("2d")

        // SETTING THE DIMENSIONS TO TARGET SIZE
        offScreenCanvas.width = width
        offScreenCanvas.height = height

        // DRAWING SOURCE IMAGE INTO THE OFF-SCREEN CANVAS
        ctx.drawImage(img, 0, 0, width, height)

        // EXPORTING THE PICTURE AS A PNG IMAGE IN BASE64 FORMAT
        return offScreenCanvas.toDataURL("image/png")
      }

      function renderImage() {
        // INCREASING THE ELEMENT LOADED COUNTER
        loadedElements = loadedElements + 1

        // CHECKING IF THE RIGHT AMOUNT OF ELEMENTS ARE LOADED
        if (loadedElements < 3) {
          // NO POINT GOING ANY FURTHER
          return
        }

        uploader.blur()

        var context = canvas.getContext("2d")

        context.clearRect(0, 0, canvas.width, canvas.height)

        if (backgroundSelector.value === "WHITE") {
          context.fillStyle = "white"
          context.fillRect(0, 0, canvas.width, canvas.height)
        }

        if (laptopSelector.value === "MACBOOK") {
          context.drawImage(
            imageMacbook,
            1024 / 2 - 900 / 2,
            589 / 2 - 518 / 2,
            900,
            518
          )
        } else {
          context.drawImage(
            imageNotebook,
            1024 / 2 - 900 / 2,
            589 / 2 - 518 / 2,
            900,
            518
          )
        }

        try {
          var filereader = new FileReader()

          var extension = uploader.files[0].name.split(".").pop().toLowerCase()

          if (extension === "jpg" || extension === "jpeg" || extension === "png") {
            filereader.onload = function () {
              var image1 = new Image()
              image1.onload = function () {
                var image2 = new Image()
                image2.onload = function () {
                  var width = 680
                  var height = 427

                  try {
                    var scale = (width * 1) / image2.width

                    var imagenResized = downScaleImage(image2, scale)

                    // DRAWING THE RESIZED IMAGE
                    context.drawImage(imagenResized, 173, 71, width, height)
                  } catch (err) {
                    // IF THERE IS AN ERROR, IT MEANS THAT THE FILE IMAGE IS SMALLER THAN
                    // THE SIZE THAT IT SUPPOSED TO FILL. SO, BECAUSE OF THIS,
                    // IN THE FOLLOWING LINE THE IMAGE IS STRETCHED TO FILL.
                    context.drawImage(image2, 236, 80, width, height)
                  }

                  if (renderLogo.value === "YES") {
                    // DRAWING THE LOGO SHADOW
                    var centerX = 918
                    var centerY = 483
                    var radius = 100
                    context.beginPath()
                    context.arc(centerX, centerY, radius, 0, 2 * Math.PI, false)
                    context.fillStyle = "#101010"
                    context.alpha = 0.5
                    context.closePath()
                    context.fill()

                    context.drawImage(imageLogo, 815, 380, 200, 200)
                  }

                  image.src = canvas.toDataURL("image/png")
                }
                image2.src = resizeImageToFit(image1, 1920, 1200)
              }
              image1.src = filereader.result
            }

            filereader.readAsDataURL(uploader.files[0])
          } else {
            image.src = canvas.toDataURL("image/png")
          }
        } catch (err) {
          image.src = canvas.toDataURL("image/png")
        }
      }

      window.addEventListener("load", function () {
        canvas = document.getElementsByTagName("canvas")[0]
        image = document.getElementsByTagName("img")[0]
        uploader = document.getElementById("screenshot")
        renderLogo = document.getElementsByTagName("select")[0]
        laptopSelector = document.getElementsByTagName("select")[1]
        backgroundSelector = document.getElementsByTagName("select")[2]

        loadedElements = 0

        renderLogo.selectedIndex = 0
        renderLogo.addEventListener("change", function () {
          renderImage()
        })

        laptopSelector.selectedIndex = 0
        laptopSelector.addEventListener("change", function () {
          renderImage()
        })

        backgroundSelector.selectedIndex = 0
        backgroundSelector.addEventListener("change", function () {
          renderImage()
        })

        uploader.value = null
        uploader.addEventListener("change", function () {
          renderImage()
        })

        imageMacbook.addEventListener("load", function () {
          renderImage()
        })
        imageMacbook.src = IMAGE_MACBOOK

        imageNotebook.addEventListener("load", function () {
          renderImage()
        })
        imageNotebook.src = IMAGE_NOTEBOOK

        imageLogo.addEventListener("load", function () {
          renderImage()
        })
        imageLogo.src = IMAGE_LOGO
      })
    </script>
  </body>
</html>
